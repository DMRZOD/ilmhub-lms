name: CI

on:
  push:
    branches: [main]
  pull_request:

# Two independent pnpm projects (no root workspace), so each is installed and
# checked in its own job.
jobs:
  frontend:
    name: Frontend (lint • typecheck • test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage

  backend:
    name: Backend (typecheck • unit • integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ilmhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ilmhub_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ilmhub_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ilmhub_test
      JWT_SECRET: test-jwt-secret-at-least-sixteen-chars
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-at-least-sixteen-chars
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm typecheck
      - run: pnpm test:cov
      # Integration/e2e against the real Postgres service + seed data.
      - run: pnpm db:test:deploy
      - run: pnpm db:seed
      - run: pnpm test:e2e
