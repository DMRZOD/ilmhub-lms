name: E2E

on:
  push:
    branches: [main]
  pull_request:

# Spin up the full stack (Postgres + Redis + backend + frontend) inside the CI
# job and run Playwright against localhost. No external preview deploy needed.
jobs:
  playwright:
    name: Playwright (full stack)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ilmhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ilmhub_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/ilmhub_test
      JWT_SECRET: test-jwt-secret-at-least-sixteen-chars
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-at-least-sixteen-chars
      REDIS_URL: redis://localhost:6379
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      PORT: "3001"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            frontend/pnpm-lock.yaml

      # ---- Backend: install, migrate, seed, build ----
      - name: Install backend
        working-directory: backend
        run: pnpm install --frozen-lockfile
      - name: Prepare database
        working-directory: backend
        run: |
          pnpm prisma:generate
          pnpm db:test:deploy
          pnpm db:seed
      - name: Build backend
        working-directory: backend
        run: pnpm build

      # ---- Frontend: install, build (with API url) ----
      - name: Install frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: pnpm build

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      # Start both servers and run Playwright in ONE step so the backgrounded
      # processes stay alive for the duration of the test run (a `&` process
      # started in a separate step is killed when that step ends).
      - name: Start servers & run Playwright
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: |
          ( cd "$GITHUB_WORKSPACE/backend" && pnpm start:prod > /tmp/backend.log 2>&1 ) &
          ( cd "$GITHUB_WORKSPACE/frontend" && pnpm start > /tmp/frontend.log 2>&1 ) &
          echo "Waiting for backend /health on :3001 ..."
          for i in $(seq 1 60); do curl -sf http://localhost:3001/health >/dev/null && break; sleep 2; done
          # Readiness = the port answers HTTP (any status); the home page may SSR
          # a non-2xx, which is a test concern, not a "server down" concern.
          echo "Waiting for frontend on :3000 ..."
          for i in $(seq 1 60); do curl -s -o /dev/null http://localhost:3000 && break; sleep 2; done
          echo "=== backend log (startup) ==="; tail -n 30 /tmp/backend.log || true
          echo "=== frontend log (startup) ==="; tail -n 30 /tmp/frontend.log || true
          curl -sf http://localhost:3001/health >/dev/null || { echo "::error::backend /health not responding"; cat /tmp/backend.log; exit 1; }
          curl -s -o /dev/null http://localhost:3000 || { echo "::error::frontend port not responding"; cat /tmp/frontend.log; exit 1; }
          set +e
          pnpm test:e2e
          code=$?
          if [ $code -ne 0 ]; then
            echo "=== backend log (full) ==="; cat /tmp/backend.log
            echo "=== frontend log (full) ==="; cat /tmp/frontend.log
          fi
          exit $code

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
