<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & pills</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; line-height: 1; }
  .dot  { width: 6px; height: 6px; border-radius: 999px; }
  .neutral { background: var(--ilm-surface); color: var(--fg-1); }
  .ink     { background: var(--ilm-ink); color: var(--fg-inv); }
  .outline { background: var(--ilm-paper); color: var(--fg-1); box-shadow: inset 0 0 0 1px var(--ilm-border); }
  .lg      { padding: 8px 14px; font-size: 13px; }
</style></head>
<body><div class="card">
  <div class="row">
    <span class="pill ink">Yangi</span>
    <span class="pill neutral">Frontend</span>
    <span class="pill neutral">Backend</span>
    <span class="pill outline">UI/UX</span>
    <span class="pill outline">DevOps</span>
    <span class="pill" style="background:var(--ilm-success-bg);color:var(--ilm-success)"><span class="dot" style="background:var(--ilm-success)"></span>Tugatildi</span>
    <span class="pill" style="background:var(--ilm-warning-bg);color:var(--ilm-warning)"><span class="dot" style="background:var(--ilm-warning)"></span>Jarayonda</span>
    <span class="pill" style="background:var(--ilm-info-bg);color:var(--ilm-info)"><span class="dot" style="background:var(--ilm-info)"></span>Yangi dars</span>
    <span class="pill" style="background:var(--ilm-error-bg);color:var(--ilm-error)"><span class="dot" style="background:var(--ilm-error)"></span>Muddat o'tdi</span>
  </div>
  <div class="row" style="margin-top:8px">
    <span class="pill lg ink">★ 4.9</span>
    <span class="pill lg neutral">245 talaba</span>
    <span class="pill lg neutral">14 dars</span>
    <span class="pill lg outline">$85</span>
  </div>
</div></body></html>
