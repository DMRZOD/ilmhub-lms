<!doctype html>
<html><head><meta charset="utf-8"><title>Course card</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .card { padding: 24px; }
  .ccard {
    background: var(--ilm-paper); box-shadow: var(--shadow-sm); border-radius: 20px;
    padding: 16px; display: flex; flex-direction: column; gap: 14px;
    transition: transform 220ms cubic-bezier(0.22,1,0.36,1), box-shadow 220ms;
  }
  .ccard:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .cover {
    position: relative; aspect-ratio: 16 / 9; border-radius: 14px;
    background: var(--ilm-surface);
    background-image:
      linear-gradient(135deg, transparent 49.4%, var(--ilm-border) 49.4%, var(--ilm-border) 50.6%, transparent 50.6%),
      linear-gradient(45deg,  transparent 49.4%, var(--ilm-border) 49.4%, var(--ilm-border) 50.6%, transparent 50.6%);
    background-size: 100% 100%;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .cover.thumb-js   { background: #F7DF1E; }
  .cover.thumb-rx   { background: #0A0A0A; }
  .cover-content { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }
  .cover-mark {
    position: absolute; top: 12px; left: 12px; width: 32px; height: 32px;
    border-radius: 10px; background: rgba(255,255,255,0.9); color: #0A0A0A;
    display: flex; align-items: center; justify-content: center; font-weight: 800; letter-spacing: -0.04em; font-size: 14px;
    backdrop-filter: blur(8px); z-index: 2;
  }
  .cover-bookmark { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 10px; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; z-index: 2; }
  .cover-bookmark svg { stroke: #0A0A0A; }
  .ccard-body { padding: 4px 8px 8px; display: flex; flex-direction: column; gap: 12px; }
  .top  { display: flex; gap: 14px; align-items: center; }
  .icon { stroke: var(--ilm-ink); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .title { font-size: 16px; font-weight: 700; line-height: 1.25; letter-spacing: -0.01em; }
  .author { font-size: 13px; font-weight: 500; color: var(--fg-3); }
  .meta { display: flex; gap: 14px; font-size: 12px; color: var(--fg-3); font-weight: 500; }
  .meta span { display: inline-flex; align-items: center; gap: 4px; }
  .foot { display: flex; align-items: center; justify-content: space-between; }
  .price { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
  .btn { height: 36px; padding: 0 14px; border-radius: 10px; background: var(--ilm-ink); color: #fff; font: 600 13px 'Sora'; border: 0; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
  .track { height: 6px; background: var(--ilm-border); border-radius: 999px; overflow: hidden; }
  .fill { height: 100%; background: var(--ilm-ink); border-radius: 999px; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; background: var(--ilm-surface); font-size: 11px; font-weight: 600; color: var(--fg-2); }
  .cover-pill { position:absolute; bottom: 12px; left: 12px; padding: 4px 10px; border-radius: 999px; background: rgba(10,10,10,0.85); color: #fff; font-size: 11px; font-weight: 600; z-index: 2; backdrop-filter: blur(8px); }
</style></head>
<body><div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div class="ccard">
    <div class="cover thumb-js">
      <div class="cover-mark">i.</div>
      <div class="cover-bookmark">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="cover-pill">12h 30min</div>
      <div class="cover-content">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="#000"><path d="M5 4h14v16H5z" opacity="0"/><text x="12" y="17" text-anchor="middle" font-family="Sora,sans-serif" font-weight="800" font-size="11" fill="#000">JS</text></svg>
      </div>
    </div>
    <div class="ccard-body">
      <div class="col" style="display:flex;flex-direction:column;gap:4px">
        <div class="title">JavaScript asoslari</div>
        <div class="author">Aziz Karimov</div>
      </div>
      <div class="meta"><span>★ 4.8</span><span>245 talaba</span><span>14 dars</span></div>
      <div class="foot">
        <div class="price">$85</div>
        <button class="btn">Sotib olish</button>
      </div>
    </div>
  </div>

  <div class="ccard">
    <div class="cover thumb-rx">
      <div class="cover-mark">i.</div>
      <div class="cover-bookmark">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="#0A0A0A"/></svg>
      </div>
      <div class="cover-pill" style="background:rgba(255,255,255,0.95);color:#0A0A0A">62% tugatildi</div>
      <div class="cover-content">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6">
          <circle cx="12" cy="12" r="2"/>
          <ellipse cx="12" cy="12" rx="10" ry="4.2"/>
          <ellipse cx="12" cy="12" rx="10" ry="4.2" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="10" ry="4.2" transform="rotate(120 12 12)"/>
        </svg>
      </div>
    </div>
    <div class="ccard-body">
      <div class="col" style="display:flex;flex-direction:column;gap:4px">
        <div class="title">React.js Mastery</div>
        <div class="author">Malika Yusupova · <span class="pill">Jarayonda</span></div>
      </div>
      <div>
        <div class="track"><div class="fill" style="width:62%"></div></div>
        <div class="meta" style="margin-top:8px"><span>9 / 14 dars</span><span style="margin-left:auto">62%</span></div>
      </div>
      <div class="foot">
        <div class="meta"><span>★ 4.9</span><span>189 talaba</span></div>
        <button class="btn">Davom etish</button>
      </div>
    </div>
  </div>
</div></body></html>
