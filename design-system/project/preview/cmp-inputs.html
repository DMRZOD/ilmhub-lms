<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .field {
    display: flex; align-items: center; gap: 10px;
    height: 48px; padding: 0 18px; border-radius: 12px;
    background: var(--ilm-surface);
    font-family: 'Sora'; font-size: 15px; font-weight: 500;
    transition: box-shadow 220ms cubic-bezier(0.22,1,0.36,1);
  }
  .field input { flex: 1; background: transparent; border: 0; outline: 0; font: inherit; color: var(--ilm-ink); }
  .field input::placeholder { color: var(--ilm-muted); font-weight: 500; }
  .field.focus { box-shadow: inset 0 0 0 1px var(--ilm-ink); background: var(--ilm-paper); }
  .field.error { box-shadow: inset 0 0 0 1px var(--ilm-error); background: var(--ilm-paper); }
  .icon { width: 18px; height: 18px; stroke: var(--ilm-muted); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .field.focus .icon { stroke: var(--ilm-ink); }
  .lbl { font-size: 12px; font-weight: 600; color: var(--fg-3); letter-spacing: 0.04em; }
  .err { font-size: 12px; font-weight: 500; color: var(--ilm-error); }
  .pill { height: 44px; border-radius: 999px; background: var(--ilm-surface); padding: 0 18px; display: flex; align-items: center; gap: 10px; }
  .pill input { flex: 1; background: transparent; border: 0; outline: 0; font: inherit; }
</style></head>
<body><div class="card">
  <div class="stack">
    <div class="field"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Kurslarni qidiring..."></div>
    <div class="field focus"><svg class="icon" viewBox="0 0 24 24"><path d="M4 7l8 6 8-6"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg><input value="aziz@ilmhub.uz"></div>
    <div class="field error"><svg class="icon" viewBox="0 0 24 24" style="stroke:var(--ilm-error)"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><input value="parol"><span class="err">Noto'g'ri parol</span></div>
    <div class="pill"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search"></div>
  </div>
</div></body></html>
