<!doctype html>
<html><head><meta charset="utf-8"><title>Progress</title>
<link rel="stylesheet" href="_preview.css">
<style>

  .ring { width: 56px; height: 56px; transform: rotate(-90deg); }

  .ringitem { display: flex; align-items: center; gap: 12px; }
  .ringnum { font-size: 14px; font-weight: 700; }
