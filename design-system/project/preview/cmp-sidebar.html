<!doctype html>
<html><head><meta charset="utf-8"><title>Sidebar nav</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body { background: #fff; }
  .card { padding: 20px; display: grid; grid-template-columns: 240px 1fr; gap: 24px; }
  .nav { background: var(--ilm-paper); border-radius: 20px; padding: 14px; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow-sm); }
  .item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px; font-size: 14px; font-weight: 500; color: var(--fg-2); cursor: pointer; transition: all 200ms ease; }
  .item.active { background: var(--ilm-surface); color: var(--ilm-ink); font-weight: 600; }
  .item:hover:not(.active) { background: var(--ilm-surface-2); color: var(--ilm-ink); }
  .icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .vrail { width: 64px; background: var(--ilm-ink); border-radius: 20px; padding: 18px 0; display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .vitem { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.55); transition: all 200ms ease; }
  .vitem.active { background: rgba(255,255,255,0.10); color: #fff; }
  .vitem .icon { width: 20px; height: 20px; }
  .logo { width: 40px; height: 40px; border-radius: 12px; background: #fff; color: #0A0A0A; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; letter-spacing:-0.02em; margin-bottom: 8px; }
  .gloss { font-size: 11px; color: var(--fg-3); font-weight: 600; letter-spacing: 0.04em; padding: 0 6px 4px; text-transform: uppercase; }
</style></head>
<body><div class="card">
