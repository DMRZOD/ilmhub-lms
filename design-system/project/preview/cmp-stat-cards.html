<!doctype html>
<html><head><meta charset="utf-8"><title>Stat cards</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body { background: var(--ilm-surface); }
  .card { padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; background: transparent; }
  .stat {
    background: var(--ilm-paper); border-radius: 20px; padding: 22px;
    display: flex; flex-direction: column; gap: 14px; box-shadow: var(--shadow-xs);
  }
  .head { display: flex; align-items: center; justify-content: space-between; }
  .head .lbl { font-size: 13px; font-weight: 600; color: var(--fg-2); }
  .tile { width: 36px; height: 36px; border-radius: 10px; background: var(--ilm-ink); color: #fff; display: flex; align-items: center; justify-content: center; }
  .num { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .delta { font-size: 12px; font-weight: 600; color: var(--ilm-success); display: inline-flex; gap: 4px; align-items: center; }
  .icon { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body><div class="card">
  <div class="stat">
    <div class="head"><div class="lbl">Jami yozilgan</div>
      <div class="tile"><svg class="icon" width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M2 12c3-7 17-7 20 0-3 7-17 7-20 0z"/></svg></div>
    </div>
    <div class="num">5,000</div>
    <div class="delta">↑ 12% <span style="color:var(--fg-3);font-weight:500">bu oy</span></div>
  </div>
  <div class="stat">
    <div class="head"><div class="lbl">Tugatildi</div>
      <div class="tile"><svg class="icon" width="18" height="18" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
    </div>
    <div class="num">50</div>
    <div class="delta">↑ 4 <span style="color:var(--fg-3);font-weight:500">bu hafta</span></div>
  </div>
  <div class="stat">
    <div class="head"><div class="lbl">Test natijasi</div>
      <div class="tile"><svg class="icon" width="18" height="18" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9a3 3 0 1 1 5 2.2c-1 .7-2 1.3-2 2.8M12 17.5h.01"/></svg></div>
    </div>
    <div class="num">87<span style="font-size:18px;color:var(--fg-3);font-weight:600">%</span></div>
    <div class="delta" style="color:var(--ilm-muted)">— o'zgarmagan</div>
  </div>
</div></body></html>
