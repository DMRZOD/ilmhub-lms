<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Application</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .demo { display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px; }
  .panel { border-radius: 20px; padding: 24px; min-height: 200px; }
  .ink   { background: var(--ilm-ink); color: var(--fg-inv); }
  .paper { background: var(--ilm-paper); box-shadow: var(--shadow-sm); }
  .surf  { background: var(--ilm-surface); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row2  { display: flex; gap: 10px; align-items: center; }
  .tag   { padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.22); color: var(--fg-inv); font-size: 11px; font-weight: 600; }
  .h     { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; line-height: 1.15; }
  .sub   { font-size: 13px; font-weight: 500; opacity: 0.7; }
  .ink .sub { color: rgba(255,255,255,0.88); opacity: 1; }
</style></head>
<body><div class="card">
  <div class="demo">
    <div class="panel ink stack">
      <span class="tag">Pro</span>
      <div class="h">Mentor bilan o'rganing</div>
      <div class="sub">Ink panel — premium surfaces, sidebars, primary CTAs.</div>
    </div>
    <div class="panel surf stack">
      <div class="row2"><div style="width:36px;height:36px;border-radius:10px;background:var(--ilm-ink)"></div><div class="h" style="font-size:18px">Surface card</div></div>
      <div class="sub" style="color:var(--fg-2)">#F5F5F5 carries most card surfaces and inputs. No border, soft shadow.</div>
      <div style="height:8px;border-radius:999px;background:var(--ilm-border);overflow:hidden;margin-top:8px"><div style="height:100%;width:62%;background:var(--ilm-ink);border-radius:999px"></div></div>
    </div>
  </div>
</div></body></html>
