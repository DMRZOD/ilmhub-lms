<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Monochrome base</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 88px; border-radius: 16px; box-shadow: var(--shadow-xs); }
  .chip.bordered { box-shadow: inset 0 0 0 1px var(--ilm-border); }
  .name { font-size: 12px; font-weight: 600; color: var(--fg-1); letter-spacing: -0.01em; }
  .hex  { font-size: 11px; font-weight: 500; color: var(--fg-3); font-family: 'Sora', monospace; }
</style></head>
<body><div class="card">
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:var(--ilm-ink)"></div><div class="name">Ink</div><div class="hex">#0A0A0A</div></div>
    <div class="sw"><div class="chip" style="background:var(--ilm-ink-soft)"></div><div class="name">Ink soft</div><div class="hex">#1A1A1A</div></div>
    <div class="sw"><div class="chip bordered" style="background:var(--ilm-paper)"></div><div class="name">Paper</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--ilm-surface)"></div><div class="name">Surface</div><div class="hex">#F5F5F5</div></div>
    <div class="sw"><div class="chip" style="background:var(--ilm-border)"></div><div class="name">Border</div><div class="hex">#E5E7EB</div></div>
    <div class="sw"><div class="chip" style="background:var(--ilm-muted)"></div><div class="name">Muted</div><div class="hex">#9CA3AF</div></div>
  </div>
</div></body></html>
