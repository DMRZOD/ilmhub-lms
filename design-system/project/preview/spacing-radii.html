<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .sw   { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .box  { width: 100%; aspect-ratio: 1 / 1; background: var(--ilm-surface); box-shadow: inset 0 0 0 1px var(--ilm-border); }
  .name { font-size: 12px; font-weight: 700; color: var(--fg-1); }
  .px   { font-size: 11px; font-weight: 500; color: var(--fg-3); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="sw"><div class="box" style="border-radius:8px"></div><div class="name">r-sm</div><div class="px">8px</div></div>
    <div class="sw"><div class="box" style="border-radius:12px"></div><div class="name">r-md · controls</div><div class="px">12px</div></div>
    <div class="sw"><div class="box" style="border-radius:16px"></div><div class="name">r-lg · tiles</div><div class="px">16px</div></div>
    <div class="sw"><div class="box" style="border-radius:20px"></div><div class="name">r-xl</div><div class="px">20px</div></div>
    <div class="sw"><div class="box" style="border-radius:24px"></div><div class="name">r-2xl · cards</div><div class="px">24px</div></div>
    <div class="sw"><div class="box" style="border-radius:9999px"></div><div class="name">r-full</div><div class="px">pill</div></div>
  </div>
</div></body></html>
