<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .scale { display: flex; flex-direction: column; gap: 10px; }
  .row { display: grid; grid-template-columns: 60px 80px 1fr; align-items: center; gap: 16px; }
  .tok { font-size: 12px; font-weight: 700; color: var(--fg-1); }
  .px  { font-size: 12px; font-weight: 500; color: var(--fg-3); font-family: 'Sora', monospace; }
  .bar { background: var(--ilm-ink); height: 14px; border-radius: 3px; }
</style></head>
<body><div class="card">
  <div class="scale">
    <div class="row"><div class="tok">sp-1</div><div class="px">4px</div><div class="bar" style="width:4px"></div></div>
    <div class="row"><div class="tok">sp-2</div><div class="px">8px</div><div class="bar" style="width:8px"></div></div>
    <div class="row"><div class="tok">sp-3</div><div class="px">12px</div><div class="bar" style="width:12px"></div></div>
    <div class="row"><div class="tok">sp-4</div><div class="px">16px</div><div class="bar" style="width:16px"></div></div>
    <div class="row"><div class="tok">sp-6</div><div class="px">24px</div><div class="bar" style="width:24px"></div></div>
    <div class="row"><div class="tok">sp-8</div><div class="px">32px</div><div class="bar" style="width:32px"></div></div>
    <div class="row"><div class="tok">sp-12</div><div class="px">48px</div><div class="bar" style="width:48px"></div></div>
    <div class="row"><div class="tok">sp-16</div><div class="px">64px</div><div class="bar" style="width:64px"></div></div>
    <div class="row"><div class="tok">sp-20</div><div class="px">80px</div><div class="bar" style="width:80px"></div></div>
  </div>
</div></body></html>
