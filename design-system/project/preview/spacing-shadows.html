<!doctype html>
<html><head><meta charset="utf-8"><title>Shadow elevation</title>
<link rel="stylesheet" href="_preview.css">
<style>
  body { background: var(--ilm-surface-2); }
  .card { background: transparent; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding: 8px 4px 24px; }
  .sw   { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .box  { width: 100%; aspect-ratio: 1 / 1; background: var(--ilm-paper); border-radius: 18px; }
  .name { font-size: 12px; font-weight: 700; color: var(--fg-1); }
  .px   { font-size: 11px; font-weight: 500; color: var(--fg-3); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="sw"><div class="box"></div><div class="name">none</div><div class="px">rest, flush</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="name">xs</div><div class="px">subtle lift</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm · cards</div><div class="px">default</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md · hover</div><div class="px">interactive</div></div>
    <div class="sw"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg · float</div><div class="px">menus, modals</div></div>
  </div>
</div></body></html>
