<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Family</title>
<link rel="stylesheet" href="_preview.css">
<style>
  .name { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  .wts  { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 4px; }
  .wt   { display: flex; flex-direction: column; gap: 2px; }
  .wtname { font-size: 11px; color: var(--fg-3); font-weight: 500; letter-spacing: 0.04em; }
  .wtdemo { font-size: 22px; line-height: 1.1; }
  .gloss { font-size: 13px; font-weight: 500; color: var(--fg-2); max-width: 560px; line-height: 1.5; margin-top: 4px; }
</style></head>
<body><div class="card">
  <div class="name">Sora</div>
  <div class="gloss">Geometric sans, slightly playful — keeps the strict monochrome palette warm. Used across the entire system.</div>
  <div class="wts">
    <div class="wt"><div class="wtdemo" style="font-weight:400">Aa Bb 123</div><div class="wtname">400 Regular</div></div>
    <div class="wt"><div class="wtdemo" style="font-weight:500">Aa Bb 123</div><div class="wtname">500 Medium</div></div>
    <div class="wt"><div class="wtdemo" style="font-weight:600">Aa Bb 123</div><div class="wtname">600 Semibold</div></div>
    <div class="wt"><div class="wtdemo" style="font-weight:700">Aa Bb 123</div><div class="wtname">700 Bold</div></div>
    <div class="wt"><div class="wtdemo" style="font-weight:800">Aa Bb 123</div><div class="wtname">800 Extrabold</div></div>
  </div>
</div></body></html>
