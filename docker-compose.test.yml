# Local test infrastructure for the backend integration/e2e suite.
#
#   docker compose -f docker-compose.test.yml up -d
#   cd backend
#   DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ilmhub_test \
#   DIRECT_URL=postgresql://postgres:postgres@localhost:5432/ilmhub_test \
#     pnpm db:test:deploy && pnpm db:seed
#   TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ilmhub_test \
#     pnpm test:e2e
#
# CI uses GitHub Actions service containers instead (see .github/workflows).
services:
  postgres-test:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ilmhub_test
    ports:
      - "5432:5432"
    # Ephemeral storage — the test database is recreated each run.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
